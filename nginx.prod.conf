server {
    listen 80;
    server_name pgplay.games www.pgplay.games;

    access_log off;
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name pgplay.games www.pgplay.games;

    ssl_certificate /etc/nginx/ssl/pgplay.games/fullchain.cer;
    ssl_certificate_key /etc/nginx/ssl/pgplay.games/pgplay.games.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:128m;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1000;

    # Frontend
    location / {
        root /srv/www/go-plus/frontend;
        try_files $uri $uri/ /index.html;
    }

    # Admin panel
    location /admin/ {
        alias /srv/www/go-plus/admin/;
        try_files $uri $uri/ /admin/index.html;
    }

    # API proxy
    location /api/ {
        proxy_pass http://127.0.0.1:9001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static assets: try frontend first, fallback to backend
    location /assets/ {
        root /srv/www/go-plus/frontend;
        try_files $uri @backend_assets;
    }

    location @backend_assets {
        proxy_pass http://127.0.0.1:9001;
        proxy_set_header Host $host;
    }

    # Health check
    location /health {
        proxy_pass http://127.0.0.1:9001;
    }
}
