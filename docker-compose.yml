services:
  server:
    image: alpine:latest
    restart: unless-stopped
    working_dir: /app
    command: ["./server", "-config", "config.yaml"]
    volumes:
      - ./server/server-linux:/app/server:ro
      - ./server/config.production.yaml:/app/config.yaml:ro
      - ./server/assets:/app/assets:ro
      - ./server/data:/app/data
      - ./server/logs:/app/logs
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${APP_PORT:-9000}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/dist:/usr/share/nginx/html/frontend:ro
      - ./admin/dist:/usr/share/nginx/html/admin:ro
    depends_on:
      - server
    networks:
      - app-network

networks:
  app-network:
